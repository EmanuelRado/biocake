<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>BioCake · Admin</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#FC6D9F">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BioCake Admin">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<a href="#admin-content" class="skip-link">Sari la conținut</a>

<!-- ── Login Screen ───────────────────────────────────── -->
<div id="admin-login" class="admin-login">
    <div class="login-blob login-blob-1" aria-hidden="true"></div>
    <div class="login-blob login-blob-2" aria-hidden="true"></div>
    <div class="login-card">
        <h1 class="login-brand" translate="no">Bio<span>Cake</span></h1>
        <p class="login-subtitle">Panou Administrator</p>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email"
                       autocomplete="email" required
                       spellcheck="false"
                       placeholder="adresa@email.com">
            </div>
            <div class="form-group">
                <label for="login-password">Parolă</label>
                <input type="password" id="login-password"
                       autocomplete="current-password" required
                       placeholder="••••••••">
            </div>
            <p class="login-error" id="login-error" aria-live="polite"></p>
            <button type="submit" class="btn-login" id="btn-login">
                Intră în cont
            </button>
        </form>
    </div>
</div>

<!-- ── Admin App ─────────────────────────────────────── -->
<div id="admin-app" class="admin-app hidden">

    <!-- Header -->
    <header class="admin-header">
        <div>
            <h1 class="header-brand" translate="no">Bio<span>Cake</span></h1>
            <p class="header-admin-label">Administrator</p>
        </div>
        <div class="header-actions">
            <button class="btn-notify" id="btn-notify" type="button" aria-label="Activează notificările" title="Activează notificările" hidden>
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
            </button>
            <button class="btn-logout" id="btn-logout">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Ieșire
            </button>
        </div>
    </header>

    <!-- Content -->
    <main class="admin-content" id="admin-content">

        <!-- ── Comenzi Tab ────────────────────────────── -->
        <section id="tab-orders" class="tab-pane active" role="tabpanel">
            <h2 class="sr-only">Comenzi</h2>
            <div class="filter-row" id="filter-row" role="group" aria-label="Filtrează comenzi">
                <button class="filter-chip active" data-filter="all" aria-pressed="true">
                    Toate <span class="chip-count">0</span>
                </button>
                <button class="filter-chip" data-filter="pending" aria-pressed="false">
                    <span class="status-dot pending" aria-hidden="true"></span> Așteptare <span class="chip-count">0</span>
                </button>
                <button class="filter-chip" data-filter="confirmed" aria-pressed="false">
                    <span class="status-dot confirmed" aria-hidden="true"></span> Confirmate <span class="chip-count">0</span>
                </button>
                <button class="filter-chip" data-filter="paid" aria-pressed="false">
                    <span class="status-dot paid" aria-hidden="true"></span> Plătite <span class="chip-count">0</span>
                </button>
                <button class="filter-chip" data-filter="delivered" aria-pressed="false">
                    <span class="status-dot delivered" aria-hidden="true"></span> Livrate <span class="chip-count">0</span>
                </button>
            </div>
            <div class="orders-list" id="orders-list">
                <div class="loading">Se încarcă comenzile…</div>
            </div>
        </section>

        <!-- ── Produse Tab ────────────────────────────── -->
        <section id="tab-products" class="tab-pane" role="tabpanel">
            <div class="products-tab-header">
                <h2 class="products-tab-title">Produse</h2>
                <button class="btn-new-product" id="btn-new-product" aria-label="Adaugă produs nou">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                    </svg>
                    Produs Nou
                </button>
            </div>
            <div class="products-list" id="products-list">
                <div class="loading">Se încarcă produsele…</div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="admin-bottom-nav" role="tablist" aria-label="Navigare principală">
        <button class="tab-btn active" data-tab="orders" role="tab" aria-selected="true">
            <span class="tab-icon-wrap">
                <span class="tab-icon" aria-hidden="true">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4M12 16h4M8 11h.01M8 16h.01"/></svg>
                </span>
                <span class="tab-badge hidden" id="tab-orders-badge"></span>
            </span>
            <span>Comenzi</span>
        </button>
        <button class="tab-btn" data-tab="products" role="tab" aria-selected="false">
            <span class="tab-icon" aria-hidden="true">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/><path d="M2 21h20"/><path d="M7 8v3M12 8v3M17 8v3"/><path d="M7 4h.01M12 4h.01M17 4h.01"/></svg>
            </span>
            <span>Produse</span>
        </button>
    </nav>

</div>

<!-- ── Edit Product Modal ── -->
<div id="edit-overlay" class="edit-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="edit-modal" role="document">
        <div class="edit-modal-header">
            <h2 class="edit-modal-title" id="edit-modal-title">Editează Produs</h2>
            <button class="edit-close" id="edit-close" aria-label="Închide editare">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="edit-modal-body" id="edit-modal-body">
            <!-- Form injected by JS -->
        </div>
        <div class="edit-modal-footer">
            <button class="btn-delete-product" id="edit-delete" aria-label="Șterge produsul">
                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Șterge
            </button>
            <button class="btn-save-product" id="edit-save">Salvează modificările</button>
        </div>
    </div>
</div>

<!-- ── Banner instalare PWA ── -->
<div id="pwa-banner" class="pwa-banner" hidden>
    <div class="pwa-banner-icon" aria-hidden="true">
        <img src="images/icon-192.png" alt="" width="34" height="34">
    </div>
    <p class="pwa-banner-text" id="pwa-banner-text">Instalează aplicația pe ecranul principal pentru acces rapid.</p>
    <button type="button" class="pwa-banner-install" id="pwa-install-btn">Instalează</button>
    <button type="button" class="pwa-banner-close" id="pwa-banner-close" aria-label="Închide">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>

<!-- ── PWA: service worker + prompt de instalare ── -->
<script>
(function () {
    // Înregistrează service worker-ul
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js', { scope: '/admin.html' }).catch((err) => {
                console.warn('SW register failed:', err);
            });
        });
    }

    const banner    = document.getElementById('pwa-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const closeBtn  = document.getElementById('pwa-banner-close');
    const textEl    = document.getElementById('pwa-banner-text');
    let deferredPrompt = null;

    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const isIOS        = /iphone|ipad|ipod/i.test(navigator.userAgent);

    // Bug vechi: X seta localStorage dar bannerul rămânea vizibil → curățăm o dată
    localStorage.removeItem('pwa-banner-dismissed');

    function isDismissed() {
        return sessionStorage.getItem('pwa-banner-dismissed') === '1';
    }

    function hideBanner(persist) {
        if (!banner) return;
        banner.hidden = true;
        if (persist) sessionStorage.setItem('pwa-banner-dismissed', '1');
    }

    function showBanner() {
        if (!banner || isStandalone || isDismissed()) return;
        banner.hidden = false;
    }

    // Android / Chrome: prompt nativ de instalare
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.hidden = false;
        showBanner();
    });

    installBtn?.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        hideBanner(true);
    });

    closeBtn?.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        hideBanner(true);
    });

    // iOS Safari: nu are beforeinstallprompt → instrucțiuni manuale
    if (isIOS && !isStandalone) {
        installBtn.hidden = true;
        textEl.textContent = 'iPhone: apasă Share (⬆) în bara Safari, apoi „Adaugă la ecranul principal" — ca să instalezi aplicația și să poți primi notificări.';
        showBanner();
    }
})();
</script>
</body>
</html>
