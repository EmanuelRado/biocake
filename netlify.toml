# Configurare Netlify — site static BioCake (fără build step)
[build]
  publish = "."
  command = ""

# Headere de securitate de bază pentru tot site-ul
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets (imagini, CSS, JS)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"


# Blochează accesul public la fișierele de documentație / SQL din repo
[[redirects]]
  from = "/*.md"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/*.sql"
  to = "/index.html"
  status = 404
