# Configurare Netlify — site static BioCake (fără build step)
[build]
  publish = "."
  command = ""

# Headere de securitate de bază pentru tot site-ul
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Blochează accesul public la fișierele de documentație / SQL din repo
[[redirects]]
  from = "/*.md"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/*.sql"
  to = "/index.html"
  status = 404
